<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Globo TV Brazil</title>
  <meta name="description" content="Watch Globo TV Brazil live.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg-primary: #0a0a12;
      --bg-secondary: #12121e;
      --bg-glass: rgba(18, 18, 30, 0.65);
      --accent: #00c896;
      --accent-glow: rgba(0, 200, 150, 0.35);
      --accent-dim: rgba(0, 200, 150, 0.12);
      --text-primary: #f0f0f5;
      --text-secondary: #8a8a9e;
      --danger: #ff4d6a;
      --warning: #ffb347;
      --border: rgba(255, 255, 255, 0.06);
      --radius: 16px;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000; 
      color: var(--text-primary);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ═══════ PRESENTATION TEXTS ═══════ */
    #presentationScreen {
      position: fixed;
      inset: 0;
      z-index: 1500;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      pointer-events: auto; /* Allow interaction if needed to bypass autoplay block */
    }

    .pres-text {
      position: absolute;
      opacity: 0;
      transition: opacity 1s ease-in-out, transform 3s ease-out;
      font-family: 'Playfair Display', serif;
      text-align: center;
      transform: scale(0.95);
      color: #e5d3b3;
    }

    .pres-text h2 {
      font-size: 1.5rem;
      letter-spacing: 0.4em;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .pres-text h1 {
      font-size: 3.5rem;
      letter-spacing: 0.15em;
      font-weight: 900;
      text-transform: uppercase;
      background: linear-gradient(to bottom, #fff, #c9a45c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 4px 20px rgba(201, 164, 92, 0.2);
    }

    .pres-text.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* ═══════ PLAYER ═══════ */
    #playerScreen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
      pointer-events: none;
    }

    #playerScreen.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #playerScreen::before, #playerScreen::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.4;
      z-index: 0;
      pointer-events: none;
      animation: float 12s ease-in-out infinite alternate;
    }

    #playerScreen::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, var(--accent-glow), transparent 70%);
      top: -10%; left: -10%;
    }

    #playerScreen::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(80, 60, 220, 0.25), transparent 70%);
      bottom: -10%; right: -10%;
      animation-delay: -6s;
    }

    @keyframes float {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, -30px) scale(1.1); }
    }

    .player-wrapper {
      position: relative;
      z-index: 1;
      width: 94vw;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      border-radius: var(--radius);
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 22px;
      background: var(--bg-glass);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .channel-info { display: flex; align-items: center; gap: 14px; }
    .channel-logo {
      width: 40px; height: 40px;
      border-radius: 10px;
      object-fit: cover;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
    }
    .channel-text h1 { font-size: 1rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }
    .channel-text span { font-size: 0.72rem; color: var(--text-secondary); font-weight: 500; }

    .status-badge {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 14px; border-radius: 100px;
      font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; transition: all 0.4s ease;
    }
    .status-badge.live { background: var(--accent-dim); color: var(--accent); }
    .status-badge.reconnecting { background: rgba(255, 179, 71, 0.12); color: var(--warning); }
    .status-badge.error { background: rgba(255, 77, 106, 0.12); color: var(--danger); }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; position: relative; }
    .status-badge.live .status-dot::after {
      content: ''; position: absolute; inset: -3px; border-radius: 50%;
      background: currentColor; opacity: 0.4; animation: pulse-dot 1.8s ease-in-out infinite;
    }

    @keyframes pulse-dot { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.8); opacity: 0; } }

    .video-container {
      position: relative; width: 100%; aspect-ratio: 16 / 9;
      background: #000; overflow: hidden;
    }
    .video-container video { width: 100%; height: 100%; display: block; background: #000; }

    .reconnect-overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px); z-index: 5; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
    }
    .reconnect-overlay.visible { opacity: 1; pointer-events: auto; }
    .spinner {
      width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .reconnect-overlay p { font-size: 0.9rem; color: var(--text-secondary); font-weight: 500; }
    .reconnect-overlay .attempt-count { font-size: 0.75rem; color: var(--text-secondary); margin-top: 6px; opacity: 0.7; }

    .bottom-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 22px; background: var(--bg-glass); backdrop-filter: blur(24px);
      border: 1px solid var(--border); border-top: 1px solid rgba(255,255,255,0.03);
      border-radius: 0 0 var(--radius) var(--radius);
    }
    .bottom-bar .meta {
      font-size: 0.72rem; color: var(--text-secondary); font-weight: 500;
      display: flex; align-items: center; gap: 16px;
    }
    .bottom-bar .meta .separator { width: 3px; height: 3px; border-radius: 50%; background: var(--text-secondary); opacity: 0.5; }
    .bottom-bar .controls { display: flex; gap: 8px; }

    .btn {
      padding: 7px 16px; border: 1px solid var(--border); border-radius: 8px;
      background: rgba(255,255,255,0.04); color: var(--text-secondary); font-family: inherit;
      font-size: 0.72rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
      display: flex; align-items: center; gap: 6px;
    }
    .btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); border-color: rgba(255,255,255,0.12); }
    .btn svg { width: 14px; height: 14px; }

    .event-log {
      position: fixed; bottom: 16px; left: 16px; z-index: 1000;
      display: flex; flex-direction: column; gap: 4px; max-width: 360px; pointer-events: none;
    }
    .log-entry {
      padding: 8px 14px; background: var(--bg-glass); backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: 10px; font-size: 0.68rem;
      color: var(--text-secondary); font-weight: 500;
      animation: slideUp 0.3s ease, fadeOut 0.5s ease 4.5s forwards;
      display: flex; align-items: center; gap: 8px;
    }
    .log-entry .log-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .log-entry .log-dot.green  { background: var(--accent); }
    .log-entry .log-dot.yellow { background: var(--warning); }
    .log-entry .log-dot.red    { background: var(--danger); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOut { to { opacity: 0; transform: translateY(-6px); } }

    @media (max-width: 600px) {
      .player-wrapper { width: 100vw; max-width: 100%; border-radius: 0; }
      .top-bar, .bottom-bar { padding: 10px 14px; border-radius: 0; }
      .channel-logo { width: 32px; height: 32px; }
      .channel-text h1 { font-size: 0.88rem; }
      .bottom-bar .meta { display: none; }
      .pres-text h1 { font-size: 2rem; }
      .pres-text h2 { font-size: 1rem; }
    }
  </style>
</head>
<body onclick="tryEnableAudio()">

  <!-- ═══════ PRESENTATION SCREEN (SPLASH) ═══════ -->
  <div id="presentationScreen">
    <div class="pres-text" id="presText1">
      <h2>Polayadees Presents</h2>
    </div>
    <div class="pres-text" id="presText2">
      <h1>Globo TV Brazil</h1>
    </div>
  </div>

  <!-- ═══════ PLAYER ═══════ -->
  <div id="playerScreen">
    <div class="player-wrapper">
      <div class="top-bar">
        <div class="channel-info">
          <img class="channel-logo" src="https://i.imgur.com/OoSUg78.png" alt="Globo TV Brazil" onerror="this.style.display='none'">
          <div class="channel-text">
            <h1>Globo TV Brazil</h1>
            <span>IPTV · 1080p · Live</span>
          </div>
        </div>
        <div class="status-badge live" id="statusBadge">
          <span class="status-dot"></span>
          <span id="statusText">LIVE</span>
        </div>
      </div>

      <div class="video-container" id="videoContainer">
        <!-- Initialized without muted, allows sound on autoplay if allowed by browser -->
        <video id="videoPlayer" autoplay playsinline></video>
        
        <div class="reconnect-overlay" id="reconnectOverlay">
          <div class="spinner"></div>
          <p>Reconnecting to stream…</p>
          <span class="attempt-count" id="attemptCount"></span>
        </div>
      </div>

      <div class="bottom-bar">
        <div class="meta">
          <span id="clockDisplay">--:--:--</span>
          <span class="separator"></span>
          <span id="uptimeDisplay">Uptime: --</span>
        </div>
        <div class="controls">
          <button class="btn" id="muteBtn" onclick="toggleMute()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <line x1="23" y1="9" x2="17" y2="15" id="muteLine1" style="display: none;"></line>
              <line x1="17" y1="9" x2="23" y2="15" id="muteLine2" style="display: none;"></line>
            </svg>
            <span id="muteText">Mute</span>
          </button>
          <button class="btn" onclick="manualReload()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"></polyline>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
            Reload
          </button>
          <button class="btn" id="fullscreenBtn" onclick="goFullscreen()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 3 21 3 21 9"></polyline>
              <polyline points="9 21 3 21 3 15"></polyline>
              <line x1="21" y1="3" x2="14" y2="10"></line>
              <line x1="3" y1="21" x2="10" y2="14"></line>
            </svg>
            Fullscreen
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="event-log" id="eventLog"></div>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- SEQUENCE AND PLAYER LOGIC                                   -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <script>
    const STREAM_URL = 'http://187.62.68.32:8080/GLOBO/index.m3u8';
    const MAX_RETRIES = Infinity;
    const BASE_RETRY_DELAY = 3000;
    const MAX_RETRY_DELAY = 30000;
    const STALL_TIMEOUT = 15000;

    const video           = document.getElementById('videoPlayer');
    const videoContainer  = document.getElementById('videoContainer');
    const statusBadge     = document.getElementById('statusBadge');
    const statusTextEl    = document.getElementById('statusText');
    const reconnectOverlay= document.getElementById('reconnectOverlay');
    const attemptCountEl  = document.getElementById('attemptCount');
    const clockDisplay    = document.getElementById('clockDisplay');
    const uptimeDisplay   = document.getElementById('uptimeDisplay');
    const muteTextEl      = document.getElementById('muteText');
    const muteLine1       = document.getElementById('muteLine1');
    const muteLine2       = document.getElementById('muteLine2');

    let hls = null;
    let retryCount = 0;
    let retryTimer = null;
    let stallTimer = null;
    let startTime = Date.now();
    let lastPlayPos = 0;
    let lastPlayTime = Date.now();
    let audioEnabled = false;
    
    // Fallback: If browser blocks autoplay with sound, a single click will fix it
    function tryEnableAudio() {
      if(!audioEnabled) {
        video.muted = false;
        video.play().catch(()=>{});
        audioEnabled = true;
      }
    }

    // ── SEQUENCING TIMELINE ──
    document.addEventListener("DOMContentLoaded", () => {
      // 1. Immediately start preloading the stream in background
      initStream();
      
      // 2. Show "POLAYADEES PRESENTS"
      setTimeout(() => {
        document.getElementById('presText1').classList.add('visible');
      }, 1000);

      // 3. Fade out
      setTimeout(() => {
        document.getElementById('presText1').classList.remove('visible');
      }, 3500);

      // 4. Show "GLOBO TV BRAZIL"
      setTimeout(() => {
        document.getElementById('presText2').classList.add('visible');
      }, 4500);

      // 5. Fade out
      setTimeout(() => {
        document.getElementById('presText2').classList.remove('visible');
      }, 7000);

      // 6. Hide presentation screen, reveal player, and go fullscreen
      setTimeout(() => {
        document.getElementById('presentationScreen').style.display = 'none';
        document.getElementById('playerScreen').classList.add('visible');
        
        // Browsers block automatic fullscreen without a user gesture (like a click), 
        // but we'll attempt it anyway in case settings allow it.
        try {
          goFullscreen();
        } catch(e) {}
      }, 8000);
    });

    function addLog(message, color = 'green') {
      const log = document.getElementById('eventLog');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="log-dot ${color}"></span>${message}`;
      log.appendChild(entry);
      setTimeout(() => entry.remove(), 5500);
      while (log.children.length > 4) log.firstChild.remove();
    }

    function setStatus(state, text) {
      statusBadge.className = 'status-badge ' + state;
      statusTextEl.textContent = text;
    }

    function showOverlay(show, attempt) {
      reconnectOverlay.classList.toggle('visible', show);
      if (attempt !== undefined) attemptCountEl.textContent = `Attempt ${attempt}`;
    }

    function updateClock() {
      const now = new Date();
      clockDisplay.textContent = now.toLocaleTimeString();
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const h = Math.floor(elapsed / 3600);
      const m = Math.floor((elapsed % 3600) / 60);
      const s = elapsed % 60;
      uptimeDisplay.textContent = `Uptime: ${h > 0 ? h + 'h ' : ''}${m}m ${s}s`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    function toggleMute() {
      video.muted = !video.muted;
      muteTextEl.textContent = video.muted ? 'Unmute' : 'Mute';
      muteLine1.style.display = video.muted ? '' : 'none';
      muteLine2.style.display = video.muted ? '' : 'none';
    }

    function goFullscreen() {
      const el = videoContainer; // or document.documentElement to fullscreen entire page
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    function startStallDetection() {
      clearInterval(stallTimer);
      lastPlayPos = video.currentTime;
      lastPlayTime = Date.now();
      stallTimer = setInterval(() => {
        if (video.paused || video.ended) return;
        if (video.currentTime === lastPlayPos && Date.now() - lastPlayTime > STALL_TIMEOUT) {
          addLog('Stream stalled — restarting…', 'yellow');
          restartStream();
        }
        if (video.currentTime !== lastPlayPos) {
          lastPlayPos = video.currentTime;
          lastPlayTime = Date.now();
        }
      }, 2000);
    }

    function destroyHls() {
      if (hls) { hls.destroy(); hls = null; }
      clearTimeout(retryTimer);
      clearInterval(stallTimer);
    }

    function initStream() {
      destroyHls();
      startTime = Date.now();

      if (!Hls.isSupported()) {
        video.src = STREAM_URL;
        video.addEventListener('error', () => scheduleRetry());
        video.play().catch(() => {});
        addLog('Using native HLS playback', 'green');
        return;
      }

      hls = new Hls({
        enableWorker: true,
        lowLatencyMode: false,
        // -- NETWORK REINFORCEMENT --
        maxBufferLength: 60,         // Increase buffer limit to 60 seconds
        maxMaxBufferLength: 600,     
        backBufferLength: 30,        // Keep history
        liveSyncDurationCount: 6,    // Increase acceptable delay from live edge (helps stabilize stream)
        liveMaxLatencyDurationCount: 15,
        fragLoadingTimeOut: 20000,
        fragLoadingMaxRetry: 10,
        fragLoadingRetryDelay: 1000,
        manifestLoadingTimeOut: 20000,
        manifestLoadingMaxRetry: 10,
        manifestLoadingRetryDelay: 1000,
        levelLoadingMaxRetry: 10,
        startLevel: -1,
      });

      hls.loadSource(STREAM_URL);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch((e) => {
          // If browser blocks unmuted autoplay, mute it to allow it to load, user can unmute later
          console.log("Autoplay blocked, muting to start stream", e);
          video.muted = true;
          video.play().catch(()=>{});
          muteTextEl.textContent = 'Unmute';
          muteLine1.style.display = '';
          muteLine2.style.display = '';
        });
        retryCount = 0;
        setStatus('live', 'LIVE');
        showOverlay(false);
        addLog('Stream preloading connected', 'green');
        startStallDetection();
      });

      hls.on(Hls.Events.ERROR, (event, data) => {
        console.warn('[HLS Error]', data.type, data.details, data.fatal);
        if (data.fatal) {
          switch (data.type) {
            case Hls.ErrorTypes.NETWORK_ERROR:
              addLog(`Network error: ${data.details}`, 'red');
              hls.startLoad();
              retryTimer = setTimeout(() => {
                if (hls && hls.media && hls.media.paused) scheduleRetry();
              }, 5000);
              break;
            case Hls.ErrorTypes.MEDIA_ERROR:
              addLog('Media error — recovering…', 'yellow');
              hls.recoverMediaError();
              break;
            default:
              addLog(`Fatal error: ${data.details}`, 'red');
              scheduleRetry();
              break;
          }
        }
      });

      video.addEventListener('waiting', () => setStatus('reconnecting', 'BUFFERING'));
      video.addEventListener('playing', () => {
        setStatus('live', 'LIVE');
        showOverlay(false);
        retryCount = 0;
      });
    }

    function scheduleRetry() {
      destroyHls();
      retryCount++;
      const delay = Math.min(BASE_RETRY_DELAY * Math.pow(1.5, retryCount - 1), MAX_RETRY_DELAY);
      setStatus('reconnecting', 'RECONNECTING');
      showOverlay(true, retryCount);
      addLog(`Retry in ${(delay / 1000).toFixed(1)}s (attempt ${retryCount})`, 'yellow');
      retryTimer = setTimeout(() => initStream(), delay);
    }

    function restartStream() {
      addLog('Restarting stream…', 'yellow');
      scheduleRetry();
    }

    function manualReload() {
      retryCount = 0;
      addLog('Manual reload triggered', 'green');
      setStatus('reconnecting', 'LOADING');
      showOverlay(true, 0);
      setTimeout(() => initStream(), 300);
    }

    video.addEventListener('error', () => {
      addLog('Video element error', 'red');
      scheduleRetry();
    });

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && video.paused) {
        addLog('Tab refocused — resuming', 'green');
        video.play().catch(() => restartStream());
      }
    });
  </script>
</body>
</html>
